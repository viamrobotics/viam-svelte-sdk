name: Main

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  deploy-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install and Build 🔧
        run: |
          pnpm i
          pnpm run build

      # The changesets action creates its own .npmrc, overriding the one from
      # setup-node that has OIDC auth. Copy it to ~/.npmrc so the action finds
      # it instead of creating a blank one. See: https://github.com/changesets/action/issues/515
      - name: Preserve .npmrc for OIDC publishing
        run: cp "$NPM_CONFIG_USERCONFIG" ~/.npmrc

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          # This expects you to have a script called release which does a build for your packages and calls changeset publish
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
